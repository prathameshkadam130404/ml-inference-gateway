services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gateway
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  model-server:
    build: 
      context: .
      dockerfile: model-server/Dockerfile
    environment:
      - MODEL_PATH=/models/covtype_mlp.onnx
      - FAULT_RATE=0.0
      - LATENCY_MS=0
    ports:
      - "50051:50051"
    volumes:
      - ./models:/models
    healthcheck:
      # Simple healthcheck for the container
      test: ["CMD", "python", "-c", "import grpc, sys; sys.exit(0)"]
      interval: 10s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/gateway
      - DB_USER=postgres
      - DB_PASS=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MODEL_SERVER_URL=model-server:50051
    ports:
      - "8080:8080"
      - "8081:8081" # Actuator/Prometheus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
